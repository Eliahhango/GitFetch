<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f8cf7"/>
      <stop offset="100%" stop-color="#7275f5"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f8cf7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4f8cf7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#7275f5" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7275f5" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" rx="0"/>

  <!-- Ambient glow circles -->
  <circle cx="200" cy="150" r="300" fill="url(#glow1)"/>
  <circle cx="1000" cy="450" r="350" fill="url(#glow2)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="white" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="white" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="white" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="white" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="white" stroke-width="0.5"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="white" stroke-width="0.5"/>
  </g>

  <!-- Folder icon -->
  <g transform="translate(80, 80)">
    <rect x="0" y="20" width="60" height="50" rx="8" fill="url(#accent)" opacity="0.9"/>
    <rect x="0" y="20" width="60" height="50" rx="8" fill="url(#accent)" opacity="0.9"/>
    <path d="M0 28 L0 20 L25 20 L30 28 Z" fill="url(#accent)" opacity="0.7"/>
    <rect x="12" y="35" width="36" height="4" rx="2" fill="white" opacity="0.8"/>
    <rect x="12" y="45" width="28" height="4" rx="2" fill="white" opacity="0.5"/>
    <rect x="12" y="55" width="32" height="4" rx="2" fill="white" opacity="0.3"/>
  </g>

  <!-- Main title -->
  <text x="80" y="240" font-family="Inter, -apple-system, sans-serif" font-size="64" font-weight="800" fill="white" letter-spacing="-2">
    GitFetch
  </text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#a1a1aa" letter-spacing="-0.5">
    Directory Downloader
  </text>

  <!-- Description -->
  <text x="80" y="360" font-family="Inter, -apple-system, sans-serif" font-size="20" font-weight="400" fill="#71717a" letter-spacing="0">
    Download any GitHub subdirectory as a ZIP archive instantly.
  </text>
  <text x="80" y="390" font-family="Inter, -apple-system, sans-serif" font-size="20" font-weight="400" fill="#71717a" letter-spacing="0">
    No cloning. No full-repo downloads. Client-side, privacy-first.
  </text>

  <!-- Feature pills -->
  <g transform="translate(80, 440)">
    <rect x="0" y="0" width="130" height="36" rx="18" fill="rgba(79,140,247,0.15)" stroke="rgba(79,140,247,0.3)" stroke-width="1"/>
    <text x="65" y="23" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#4f8cf7" text-anchor="middle">Batch Queue</text>

    <rect x="145" y="0" width="130" height="36" rx="18" fill="rgba(79,140,247,0.15)" stroke="rgba(79,140,247,0.3)" stroke-width="1"/>
    <text x="210" y="23" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#4f8cf7" text-anchor="middle">Smart Filters</text>

    <rect x="290" y="0" width="160" height="36" rx="18" fill="rgba(79,140,247,0.15)" stroke="rgba(79,140,247,0.3)" stroke-width="1"/>
    <text x="370" y="23" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#4f8cf7" text-anchor="middle">Privacy First</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(255,255,255,0.03)"/>
  <line x1="0" y1="580" x2="1200" y2="580" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <text x="80" y="612" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#52525b">
    github.com/Eliahhango/GitFetch
  </text>

  <!-- Rate limit badge -->
  <g transform="translate(950, 590)">
    <rect x="0" y="0" width="170" height="30" rx="15" fill="rgba(79,140,247,0.1)" stroke="rgba(79,140,247,0.2)" stroke-width="1"/>
    <text x="85" y="20" font-family="Inter, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#4f8cf7" text-anchor="middle">5,000 req/hr with token</text>
  </g>
</svg>
